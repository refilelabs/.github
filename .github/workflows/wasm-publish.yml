name: WASM Publish
on:
  workflow_call:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: oven-sh/setup-bun@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - run: bun install --ignore-scripts
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: bun run publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  release:
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          args: --verbose --latest
        env:
          GITHUB_REPO: ${{ github.repository }}
      - name: Build release body
        run: |
          REPO="${{ github.event.repository.name }}"
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo "[![npm](https://npmx.dev/api/registry/badge/version/@refilelabs/${REPO}/v/${VERSION})](https://npmx.dev/package/@refilelabs/${REPO}/v/${VERSION}) [![crates.io](https://img.shields.io/badge/crates.io-v${VERSION}-orange?logo=rust)](https://crates.io/crates/refilelabs-${REPO}/${VERSION})"
            echo ""
            echo "---"
            echo ""
            cat "${{ steps.cliff.outputs.changelog }}"
          } > release_body.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
